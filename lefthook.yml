pre-commit:
  parallel: true
  commands:
    prettier:
      root: "project/"
      glob: "project/**/*.{js,jsx,ts,tsx,json,css,scss,md,yml,yaml}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true

    eslint:
      root: "project/"
      glob: "project/**/*.{js,jsx,ts,tsx}"
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    unit-tests:
      root: "project/"
      run: pnpm test:unit

    integration-tests:
      root: "project/"
      run: pnpm test:integration
